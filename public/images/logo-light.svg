<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Sphere gradient for O (same purple, visible on light bg) -->
    <radialGradient id="sphere-l" cx="35%" cy="30%" r="65%">
      <stop offset="0%" stop-color="#C77DFF"/>
      <stop offset="50%" stop-color="#7B2CBF"/>
      <stop offset="100%" stop-color="#3C096C"/>
    </radialGradient>
    <!-- Border gradient (darker, visible on light bg) -->
    <linearGradient id="border-l" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#5A189A"/>
      <stop offset="100%" stop-color="#3C096C"/>
    </linearGradient>
    <!-- Light interior bg -->
    <radialGradient id="bg-l" cx="50%" cy="45%" r="55%">
      <stop offset="0%" stop-color="#F5F0FF"/>
      <stop offset="100%" stop-color="#EAE1F8"/>
    </radialGradient>
    <clipPath id="clip-l">
      <circle cx="100" cy="100" r="86"/>
    </clipPath>
  </defs>

  <!-- Gold outer accent ring -->
  <circle cx="100" cy="100" r="97" fill="none" stroke="#B8902A" stroke-width="1.5"/>
  <!-- Dark purple main border -->
  <circle cx="100" cy="100" r="92" fill="none" stroke="url(#border-l)" stroke-width="6"/>
  <!-- Inner gold hairline -->
  <circle cx="100" cy="100" r="88" fill="none" stroke="rgba(184,144,42,0.35)" stroke-width="0.8"/>

  <!-- Interior fill (light) -->
  <circle cx="100" cy="100" r="87" fill="url(#bg-l)"/>

  <!-- AO monogram (clipped inside circle) -->
  <g clip-path="url(#clip-l)">

    <!-- "A" — dark navy on light background -->
    <line x1="72" y1="38" x2="32" y2="122"
          stroke="#1A0033" stroke-width="14" stroke-linecap="round"/>
    <line x1="72" y1="38" x2="97" y2="122"
          stroke="#1A0033" stroke-width="14" stroke-linecap="round"/>
    <!-- Crossbar -->
    <line x1="47" y1="91" x2="78" y2="91"
          stroke="#1A0033" stroke-width="9" stroke-linecap="round"/>

    <!-- "O" globe — same purple, clearly visible on light bg too -->
    <circle cx="116" cy="76" r="31" fill="url(#sphere-l)"/>
    <ellipse cx="116" cy="76" rx="31" ry="10"
             fill="none" stroke="rgba(255,255,255,0.22)" stroke-width="1.5"/>
    <ellipse cx="116" cy="76" rx="10" ry="31"
             fill="none" stroke="rgba(255,255,255,0.22)" stroke-width="1.5"/>
    <circle cx="116" cy="76" r="31"
            fill="none" stroke="rgba(255,255,255,0.50)" stroke-width="2"/>
    <circle cx="105" cy="63" r="7" fill="rgba(255,255,255,0.28)"/>

  </g>

  <!-- Divider -->
  <line x1="58" y1="139" x2="142" y2="139"
        stroke="rgba(184,144,42,0.45)" stroke-width="0.8"/>

  <!-- "THE ADRIAN ONE" -->
  <text x="100" y="154"
        text-anchor="middle"
        font-family="'Trebuchet MS','Arial Narrow',Arial,sans-serif"
        font-size="12" font-weight="800"
        fill="#1A0033" letter-spacing="2.8">THE ADRIAN ONE</text>

  <!-- "WEB &amp; APP DEV" -->
  <text x="100" y="168"
        text-anchor="middle"
        font-family="'Trebuchet MS',Arial,sans-serif"
        font-size="7.5" font-weight="500"
        fill="#6B21A8" letter-spacing="2.2">WEB &amp; APP DEV</text>
</svg>
