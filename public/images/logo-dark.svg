<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Sphere gradient for O -->
    <radialGradient id="sphere-d" cx="35%" cy="30%" r="65%">
      <stop offset="0%" stop-color="#C77DFF"/>
      <stop offset="50%" stop-color="#7B2CBF"/>
      <stop offset="100%" stop-color="#3C096C"/>
    </radialGradient>
    <!-- Border gradient -->
    <linearGradient id="border-d" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#9D4EDD"/>
      <stop offset="100%" stop-color="#5A189A"/>
    </linearGradient>
    <!-- Interior subtle bg -->
    <radialGradient id="bg-d" cx="50%" cy="45%" r="55%">
      <stop offset="0%" stop-color="#180332"/>
      <stop offset="100%" stop-color="#030008"/>
    </radialGradient>
    <clipPath id="clip-d">
      <circle cx="100" cy="100" r="86"/>
    </clipPath>
  </defs>

  <!-- Gold outer accent ring -->
  <circle cx="100" cy="100" r="97" fill="none" stroke="#C9A84C" stroke-width="1.5"/>
  <!-- Purple gradient main border -->
  <circle cx="100" cy="100" r="92" fill="none" stroke="url(#border-d)" stroke-width="6"/>
  <!-- Inner gold hairline -->
  <circle cx="100" cy="100" r="88" fill="none" stroke="rgba(201,168,76,0.35)" stroke-width="0.8"/>

  <!-- Interior fill -->
  <circle cx="100" cy="100" r="87" fill="url(#bg-d)"/>

  <!-- AO monogram (clipped inside circle) -->
  <g clip-path="url(#clip-d)">

    <!-- "A" — two legs + crossbar in white -->
    <!-- Apex: (72, 38) | Left base: (32, 122) | Right base: (97, 122) -->
    <line x1="72" y1="38" x2="32" y2="122"
          stroke="white" stroke-width="14" stroke-linecap="round"/>
    <line x1="72" y1="38" x2="97" y2="122"
          stroke="white" stroke-width="14" stroke-linecap="round"/>
    <!-- Crossbar — stops before O starts -->
    <line x1="47" y1="91" x2="78" y2="91"
          stroke="white" stroke-width="9" stroke-linecap="round"/>

    <!-- "O" globe — center (116, 76), radius 31 -->
    <!-- Positioned so left edge ≈ meets right leg of A -->
    <circle cx="116" cy="76" r="31" fill="url(#sphere-d)"/>
    <!-- Globe latitude line -->
    <ellipse cx="116" cy="76" rx="31" ry="10"
             fill="none" stroke="rgba(255,255,255,0.20)" stroke-width="1.5"/>
    <!-- Globe longitude line -->
    <ellipse cx="116" cy="76" rx="10" ry="31"
             fill="none" stroke="rgba(255,255,255,0.20)" stroke-width="1.5"/>
    <!-- Outer ring highlight -->
    <circle cx="116" cy="76" r="31"
            fill="none" stroke="rgba(255,255,255,0.55)" stroke-width="2"/>
    <!-- Light reflection spot -->
    <circle cx="105" cy="63" r="7" fill="rgba(255,255,255,0.22)"/>

  </g>

  <!-- Divider -->
  <line x1="58" y1="139" x2="142" y2="139"
        stroke="rgba(201,168,76,0.40)" stroke-width="0.8"/>

  <!-- "THE ADRIAN ONE" -->
  <text x="100" y="154"
        text-anchor="middle"
        font-family="'Trebuchet MS','Arial Narrow',Arial,sans-serif"
        font-size="12" font-weight="800"
        fill="white" letter-spacing="2.8">THE ADRIAN ONE</text>

  <!-- "WEB &amp; APP DEV" -->
  <text x="100" y="168"
        text-anchor="middle"
        font-family="'Trebuchet MS',Arial,sans-serif"
        font-size="7.5" font-weight="500"
        fill="rgba(190,140,230,0.80)" letter-spacing="2.2">WEB &amp; APP DEV</text>
</svg>
